<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Digital Calendar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button class="nav-btn prev-btn" id="prevBtn">❮</button>
                <h1 id="monthYear" class="month-year"></h1>
                <button class="nav-btn next-btn" id="nextBtn">❯</button>
            </div>
            
            <div class="calendar-controls">
                <button class="btn btn-today" id="todayBtn">Today</button>
                <button class="btn btn-clear" id="clearBtn">Clear</button>
            </div>

            <div class="weekdays">
                <div class="weekday">Sun</div>
                <div class="weekday">Mon</div>
                <div class="weekday">Tue</div>
                <div class="weekday">Wed</div>
                <div class="weekday">Thu</div>
                <div class="weekday">Fri</div>
                <div class="weekday">Sat</div>
            </div>

            <div class="days" id="daysContainer"></div>
        </div>

        <div class="info-panel">
            <h2>Calendar Info</h2>
            <div class="info-content">
                <p><strong>Today:</strong> <span id="todayDate"></span></p>
                <p><strong>Selected Date:</strong> <span id="selectedDate">None</span></p>
                <p><strong>Days in Month:</strong> <span id="daysInMonth"></span></p>
                <div id="eventsList" class="events-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
